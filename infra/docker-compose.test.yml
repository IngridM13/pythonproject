version: '3.8'

services:
  # Servicio para ejecutar los tests
  test:
    build:
      context: ..
      dockerfile: infra/Dockerfile.test
    depends_on:
      - milvus
    environment:
      - MILVUS_URI=http://milvus:19530
      - SKIP_MILVUS_TESTS=False
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=test_db
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_password
      - LOG_LEVEL=INFO

  # Servicio de Milvus para tests
  milvus:
    image: milvusdb/milvus:v2.6.0
    container_name: milvus-test
    init: true
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    depends_on:
      - etcd
      - minio
    volumes:
      - ./volumes/milvus/data:/var/lib/milvus/data
      - ./volumes/milvus/conf:/var/lib/milvus/conf
      - ./volumes/milvus/logs:/var/lib/milvus/logs

  # Etcd para Milvus
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: etcd-test
    init: true
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd/data:/etcd/data
    command:
      - etcd
      - -advertise-client-urls=http://etcd:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd/data

  # MinIO para Milvus
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: minio-test
    init: true
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - ./volumes/minio/data:/data
    command: minio server /data --console-address ":9001"


volumes:
  postgres_test_data: