version: '3.8'

services:
  # Servicio para ejecutar los tests
  test:
    build:
      context: volumes
      dockerfile: Dockerfile.test
    volumes:
      - .:/app
    depends_on:
      - milvus
      - postgres
    environment:
      - MILVUS_URI=http://milvus:19530
      - SKIP_MILVUS_TESTS=False
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=test_db
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_password
      - LOG_LEVEL=INFO

  # Servicio de Milvus para tests
  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: milvus-test
    ports:
      - "19530:19530"
      - "19531:19531"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    depends_on:
      - etcd
      - minio
    volumes:
      - ./volumes/milvus/data:/var/lib/milvus/data
      - ./volumes/milvus/conf:/var/lib/milvus/conf
      - ./volumes/milvus/logs:/var/lib/milvus/logs

  # Etcd para Milvus
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: etcd-test
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd/data:/etcd/data
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd/data

  # MinIO para Milvus
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: minio-test
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ./volumes/minio/data:/data
    command: minio server /data


volumes:
  postgres_test_data: